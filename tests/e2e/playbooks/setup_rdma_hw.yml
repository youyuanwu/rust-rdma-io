---
# Hardware RDMA setup: install the RDMA/RoCEv2 userspace stack on hosts with a
# real RDMA NIC (e.g. Azure MANA RoCEv2). Unlike setup_rdma.yml, this does NOT
# load the software rxe provider — the kernel driver is already present.
#
# Use this playbook for hardware RoCEv2 hosts; use setup_rdma.yml for local
# QEMU/KVM VMs that need the software rxe provider.
#
# Usage:
#   ansible-playbook -i <inventory> playbooks/setup_rdma_hw.yml

- name: Install RDMA userspace stack on hardware RDMA hosts
  hosts: vms
  become: true
  gather_facts: false
  vars:
    rdma_packages:
      - rdma-core
      - rdmacm-utils
      - ibverbs-utils
      - libibverbs-dev
      - librdmacm-dev
      # Bandwidth / latency micro-benchmark tools (perf_bench.yml).
      - perftest
      - qperf
      # Runtime dependency of the rdma-io-bench binaries (tonic-tls / openssl).
      - libssl3
  tasks:
    - name: Install RDMA packages (skips any already present)
      ansible.builtin.apt:
        name: "{{ rdma_packages }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Raise open-file (nofile) limits for high connection-count benchmarks
      # Each RDMA connection consumes ~3 fds (CM id + QP + event channel), so the
      # distro default soft nofile=1024 caps the bench client/server near
      # ~320 (rings) / ~960 (TCP) connections — a client-side fd wall, not a
      # transport limit. The hard limit is already high (1048576 on these VMs);
      # lift the soft limit to match so high-conn sweeps aren't fd-bound. The
      # bench playbook also raises the soft limit at launch (belt-and-suspenders,
      # in case pam_limits isn't applied to the non-interactive Ansible session).
      ansible.builtin.copy:
        dest: /etc/security/limits.d/99-rdma-bench.conf
        content: |
          # Managed by tests/e2e/playbooks/setup_rdma_hw.yml (rdma-io-bench).
          *     soft    nofile    1048576
          *     hard    nofile    1048576
          root  soft    nofile    1048576
          root  hard    nofile    1048576
        owner: root
        group: root
        mode: '0644'

    - name: Verify RDMA devices are visible
      ansible.builtin.command:
        cmd: ibv_devices
      register: ibv_devices_out
      changed_when: false

    - name: Show detected RDMA devices
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}:\n{{ ibv_devices_out.stdout }}"
