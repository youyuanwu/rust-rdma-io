---
- name: Start Benchmark Server
  hosts: vm1
  tasks:
    - name: Stop any existing server
      ansible.builtin.shell: |
        if [ -f /tmp/bench-server.pid ]; then
          kill $(cat /tmp/bench-server.pid) 2>/dev/null || true
          rm -f /tmp/bench-server.pid
        fi
      changed_when: false
      ignore_errors: true

    - name: Start server
      ansible.builtin.shell: |
        RUST_LOG="{{ bench_rust_log | default('info') }}" \
        RUST_BACKTRACE=1 \
        nohup ~/bin/rdma-bench-server \
          --bind "{{ rdma_ip | default(ansible_host) }}:50051" \
          --mode "{{ bench_mode | default('rh2') }}" \
          --transport "{{ bench_transport | default('send-recv') }}" \
          {{ '--mw-fallback' if (bench_mw_fallback | default(false) | bool) else '' }} \
          --cert ~/certs/cert.pem \
          --key ~/certs/key.pem \
          > /tmp/bench-server.log 2>&1 &
        echo $! > /tmp/bench-server.pid

    - name: Wait for server
      ansible.builtin.pause:
        seconds: 2

- name: Run Benchmark Client
  hosts: vm2
  tasks:
    - name: Run benchmark
      ansible.builtin.shell: |
        RUST_LOG="{{ bench_rust_log | default('info') }}" \
        RUST_BACKTRACE=1 \
        ~/bin/rdma-bench-client \
          --connect "{{ hostvars['vm1'].rdma_ip | default(hostvars['vm1'].ansible_host) }}:50051" \
          --mode "{{ bench_mode | default('rh2') }}" \
          --transport "{{ bench_transport | default('send-recv') }}" \
          {{ '--mw-fallback' if (bench_mw_fallback | default(false) | bool) else '' }} \
          --connections "{{ bench_connections | default(1) }}" \
          --threads "{{ bench_threads | default(1) }}" \
          --duration "{{ bench_duration | default(10) }}" \
          --warmup "{{ bench_warmup | default(5) }}" \
          --payload "{{ bench_payload | default(64) }}" \
          --cert ~/certs/cert.pem \
          --key ~/certs/key.pem \
          --report json
      register: bench_result
      timeout: "{{ (bench_duration | default(10) | int) + (bench_warmup | default(5) | int) + 30 }}"
      changed_when: false

    - name: Ensure result directory exists
      ansible.builtin.file:
        path: "{{ bench_out_dir | default('/tmp') }}"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Save results to controller
      ansible.builtin.copy:
        content: "{{ bench_result.stdout }}"
        dest: "{{ bench_out_dir | default('/tmp') }}/bench-{{ bench_mode | default('rh2') }}-{{ bench_transport | default('send-recv') }}-{{ bench_connections | default(1) }}conn-{{ bench_threads | default(1) }}thr.json"
        mode: '0644'
      delegate_to: localhost

    - name: Display results
      ansible.builtin.debug:
        msg: "{{ bench_result.stdout }}"

- name: Stop Server
  hosts: vm1
  tasks:
    - name: Stop server
      ansible.builtin.shell: |
        if [ -f /tmp/bench-server.pid ]; then
          kill $(cat /tmp/bench-server.pid) 2>/dev/null || true
          rm -f /tmp/bench-server.pid /tmp/bench-server.log
        fi
      changed_when: false
      ignore_errors: true
