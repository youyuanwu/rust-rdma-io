---
- name: Start Benchmark Server
  hosts: vm1
  tasks:
    - name: Stop any existing server
      ansible.builtin.shell: |
        if [ -f /tmp/bench-server.pid ]; then
          pid=$(cat /tmp/bench-server.pid)
          kill "$pid" 2>/dev/null || true
          for _ in $(seq 1 50); do
            kill -0 "$pid" 2>/dev/null || break
            sleep 0.2
          done
          kill -9 "$pid" 2>/dev/null || true
          rm -f /tmp/bench-server.pid
        fi
      changed_when: false
      ignore_errors: true

    - name: Start server
      ansible.builtin.shell: |
        # Raise the fd soft limit to the hard cap so high connection-count runs
        # are not capped by the default nofile=1024 (each RDMA conn uses ~3 fds).
        ulimit -n "$(ulimit -Hn)" 2>/dev/null || true
        RUST_LOG="{{ bench_rust_log | default('info') }}" \
        RUST_BACKTRACE=1 \
        nohup ~/bin/rdma-bench-server \
          --bind "{{ rdma_ip | default(ansible_host) }}:50051" \
          --mode "{{ bench_mode | default('rh2') }}" \
          --transport "{{ bench_transport | default('send-recv') }}" \
          {{ '--require-mw' if (bench_require_mw | default(false) | bool) else '' }} \
          --connections "{{ bench_connections | default(1) }}" \
          --threads "{{ bench_threads | default(0) }}" \
          --in-flight "{{ bench_in_flight | default(1) }}" \
          --ring-max-msg "{{ bench_ring_max_msg | default(1500) }}" \
          --ring-queue-depth "{{ bench_ring_queue_depth | default(0) }}" \
          --cert ~/certs/cert.pem \
          --key ~/certs/key.pem \
          > /tmp/bench-server.log 2>&1 &
        echo $! > /tmp/bench-server.pid

    - name: Wait for server
      ansible.builtin.pause:
        seconds: 2

- name: Run Benchmark Client
  hosts: vm2
  tasks:
    - name: Run benchmark
      ansible.builtin.shell: |
        # Raise the fd soft limit to the hard cap so high connection-count runs
        # are not capped by the default nofile=1024 (each RDMA conn uses ~3 fds).
        ulimit -n "$(ulimit -Hn)" 2>/dev/null || true
        RUST_LOG="{{ bench_rust_log | default('info') }}" \
        RUST_BACKTRACE=1 \
        ~/bin/rdma-bench-client \
          --connect "{{ hostvars['vm1'].rdma_ip | default(hostvars['vm1'].ansible_host) }}:50051" \
          --mode "{{ bench_mode | default('rh2') }}" \
          --transport "{{ bench_transport | default('send-recv') }}" \
          {{ '--require-mw' if (bench_require_mw | default(false) | bool) else '' }} \
          --connections "{{ bench_connections | default(1) }}" \
          --threads "{{ bench_threads | default(1) }}" \
          --in-flight "{{ bench_in_flight | default(1) }}" \
          --duration "{{ bench_duration | default(10) }}" \
          --warmup "{{ bench_warmup | default(5) }}" \
          --payload "{{ bench_payload | default(64) }}" \
          --ring-max-msg "{{ bench_ring_max_msg | default(1500) }}" \
          --ring-queue-depth "{{ bench_ring_queue_depth | default(0) }}" \
          --cert ~/certs/cert.pem \
          --key ~/certs/key.pem \
          --report json
      register: bench_result
      # Timeout must cover connection SETUP + warmup + benchmark. Setup time
      # grows with connection count — the rh3 (HTTP/3 over QUIC) ring transports
      # take ~1s/connection to establish on the Azure MANA RoCEv2 preview
      # (~60s for 64 connections), so a fixed buffer false-timed-out high-conn
      # runs even though the client completes. Scale the buffer with the
      # connection count: base 30s + 1s per connection.
      timeout: "{{ (bench_duration | default(10) | int) + (bench_warmup | default(5) | int) + 30 + (bench_connections | default(1) | int) }}"
      changed_when: false

    - name: Ensure result directory exists
      ansible.builtin.file:
        path: "{{ bench_out_dir | default('/tmp') }}"
        state: directory
      delegate_to: localhost

    - name: Save results to controller
      ansible.builtin.copy:
        content: "{{ bench_result.stdout }}"
        dest: "{{ bench_out_dir | default('/tmp') }}/bench-{{ bench_mode | default('rh2') }}-{{ bench_transport | default('send-recv') }}-{{ bench_connections | default(1) }}conn-{{ bench_threads | default(1) }}thr-{{ bench_in_flight | default(1) }}if.json"
        mode: '0644'
      delegate_to: localhost

    - name: Display results
      ansible.builtin.debug:
        msg: "{{ bench_result.stdout }}"

    # Opt-in (save_logs=true): keep the client's stderr (RUST_LOG output) for
    # debugging. Combine with e.g. rust_log="rdma_io_bench=trace,rdma_io=debug"
    # to capture data-path errors such as the ring send-queue ENOMEM.
    - name: Save client log to controller
      ansible.builtin.copy:
        content: "{{ bench_result.stderr }}"
        dest: "{{ bench_out_dir | default('/tmp') }}/client-{{ bench_mode | default('rh2') }}-{{ bench_transport | default('send-recv') }}-{{ bench_in_flight | default(1) }}if.log"
        mode: '0644'
      delegate_to: localhost
      when: bench_save_logs | default(false) | bool

- name: Stop Server
  hosts: vm1
  tasks:
    # Opt-in (save_logs=true): pull the server's RUST_LOG output before it is
    # deleted by the stop task below.
    - name: Fetch server log to controller
      ansible.builtin.fetch:
        src: /tmp/bench-server.log
        dest: "{{ bench_out_dir | default('/tmp') }}/server-{{ bench_transport | default('send-recv') }}-{{ bench_in_flight | default(1) }}if.log"
        flat: true
      when: bench_save_logs | default(false) | bool
      ignore_errors: true

    - name: Stop server
      ansible.builtin.shell: |
        if [ -f /tmp/bench-server.pid ]; then
          pid=$(cat /tmp/bench-server.pid)
          # Send SIGTERM so the server drains connections and tears down its
          # RDMA queue pairs cleanly (rdma_disconnect) instead of being killed
          # abruptly, which wedges the MANA connection manager.
          kill "$pid" 2>/dev/null || true
          # Wait up to ~10s for graceful exit before escalating to SIGKILL.
          for _ in $(seq 1 50); do
            kill -0 "$pid" 2>/dev/null || break
            sleep 0.2
          done
          kill -9 "$pid" 2>/dev/null || true
          rm -f /tmp/bench-server.pid /tmp/bench-server.log
        fi
      changed_when: false
      ignore_errors: true
