---
- name: VM Connectivity Test
  hosts: vms
  gather_facts: false
  tasks:
    - name: Verify SSH reachability (controller -> host)
      ansible.builtin.ping:

    - name: Ping peers over the RDMA subnet (rdma_ip)
      ansible.builtin.command:
        cmd: "ping -c 3 -W 2 {{ hostvars[item].rdma_ip | default(hostvars[item].ansible_host) }}"
      loop: "{{ groups['vms'] }}"
      when: item != inventory_hostname
      register: rdma_ping
      changed_when: false

    - name: Display RDMA-subnet ping results
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ rdma_ping.results }}"
      when: item.stdout_lines is defined
      loop_control:
        label: "{{ item.item }}"
