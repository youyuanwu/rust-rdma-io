name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: "1"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libibverbs-dev \
            librdmacm-dev \
            rdma-core \
            ibverbs-utils \
            iproute2 \
            cmake \
            libclang-dev

      - uses: taiki-e/install-action@protoc

      - name: Install kernel extra modules and load siw
        run: |
          KVER=$(uname -r)
          echo "Kernel: $KVER"

          # Install extra modules (contains siw)
          sudo apt-get install -y "linux-modules-extra-${KVER}" || true

          # Load RDMA stack
          sudo modprobe rdma_cm
          sudo modprobe rdma_ucm
          sudo modprobe siw

          # Create siw device on first non-lo interface
          IFACE=$(ip -o link show up | awk -F': ' '{print $2}' | grep -v lo | head -1)
          echo "Creating siw0 on interface: $IFACE"
          sudo rdma link add siw0 type siw netdev "$IFACE"

          # Verify
          ibv_devices
          rdma link show

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: clippy

      # - uses: Swatinem/rust-cache@v2

      - name: Configure (download bnd-linux.winmd)
        run: cmake -B build

      - name: Build
        run: cargo build --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features tokio -- -D warnings

      - name: Test
        run: |
          for i in $(seq 1 5); do
            echo "=== Test run $i/5 ==="
            cargo test -p rdma-io-tests -- --nocapture
          done
        timeout-minutes: 30

      - name: Doc tests
        run: cargo test --doc --workspace --features tokio

  build-rxe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libibverbs-dev \
            librdmacm-dev \
            rdma-core \
            ibverbs-utils \
            iproute2 \
            cmake \
            libclang-dev \
            linux-headers-$(uname -r)

      - uses: taiki-e/install-action@protoc

      - name: Configure and build rdma_rxe.ko
        run: |
          cmake -B build -DBUILD_RXE=ON
          cmake --build build --target rxe --parallel

      - name: Load rdma_rxe and create device
        run: |
          # Remove Mellanox VFs if present (avoids test device confusion)
          sudo rmmod mlx5_ib 2>/dev/null || true
          sudo modprobe ib_core rdma_ucm
          sudo insmod build/_deps/linux_kernel-build/rxe/rdma_rxe.ko
          IFACE=$(ip -o link show up | awk -F': ' '{print $2}' | grep -v lo | head -1)
          echo "Creating rxe0 on interface: $IFACE"
          sudo rdma link add rxe0 type rxe netdev "$IFACE"

          # Verify
          ibv_devices
          rdma link show
          lsmod | grep -E "rdma_rxe|ib_core"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: clippy

      - name: Build
        run: cargo build --all-targets


      # - name: Shutdown tests debug
      #   run : cargo test --package rdma-io-tests --test async_stream_tests -- async_stream_shutdown_after_peer_drop --exact --nocapture 

      # - name: Tonic test debug
      #   run: cargo test --package rdma-io-tests --test tonic_tests -- tonic_greeter_over_rdma --exact --nocapture 
      #   timeout-minutes: 10

      - name: Test
        run: |
          for i in $(seq 1 5); do
            echo "=== Test run $i/5 ==="
            cargo test -p rdma-io-tests -- --nocapture
          done
        timeout-minutes: 30
